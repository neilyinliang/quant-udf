<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UDF Chart Test</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      color: #94a3b8;
    }
    input, select, button {
      height: 34px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      padding: 0 10px;
      outline: none;
    }
    button {
      cursor: pointer;
      background: #1d4ed8;
      border-color: #1d4ed8;
      font-weight: 600;
    }
    button:hover {
      background: #1e40af;
    }
    #chart {
      width: 100%;
      height: 620px;
      border: 1px solid #1f2937;
      border-radius: 10px;
      overflow: hidden;
      background: #020617;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
    }
    code {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin: 0 0 12px 0;">TradingView 图表测试页（静态）</h2>

    <form id="toolbar" class="toolbar">
      <div class="field">
        <label for="symbol">symbol</label>
        <input id="symbol" name="symbol" />
      </div>

      <div class="field">
        <label for="resolution">resolution</label>
        <select id="resolution" name="resolution">
          <option value="1">1</option>
          <option value="5">5</option>
          <option value="15">15</option>
          <option value="30">30</option>
          <option value="60">60</option>
          <option value="D">D</option>
          <option value="W">W</option>
        </select>
      </div>

      <div class="field">
        <label for="days">days</label>
        <input id="days" type="number" min="1" max="2000" name="days" />
      </div>

      <div class="field">
        <button type="submit">加载图表</button>
      </div>
    </form>

    <div id="chart"></div>
    <div id="status" class="status">初始化中...</div>
    <div class="hint">
      后端地址已固定：<code>http://127.0.0.1:8000</code>（调用 <code>/history</code>）
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    const UDF_BASE = "http://127.0.0.1:8000";
    const statusEl = document.getElementById("status");
    const chartEl = document.getElementById("chart");
    const toolbar = document.getElementById("toolbar");

    let chart = null;
    let candle = null;
    let resizeObserver = null;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function getParams() {
      const sp = new URLSearchParams(location.search);
      return {
        symbol: sp.get("symbol") || "DCE.l",
        resolution: sp.get("resolution") || "D",
        days: Number(sp.get("days") || "180"),
      };
    }

    function setInputs({ symbol, resolution, days }) {
      document.getElementById("symbol").value = symbol;
      document.getElementById("resolution").value = resolution;
      document.getElementById("days").value = String(days);
    }

    function buildHistoryUrl({ symbol, resolution, days }) {
      const nowSec = Math.floor(Date.now() / 1000);
      const fromSec = nowSec - Math.max(1, days) * 86400;
      const params = new URLSearchParams({
        symbol,
        resolution,
        from: String(fromSec),
        to: String(nowSec),
      });
      return `${UDF_BASE}/history?${params.toString()}`;
    }

    function normalizeBars(payload) {
      if (payload.s === "no_data") return [];
      if (payload.s !== "ok") {
        throw new Error(`history 返回错误: ${JSON.stringify(payload)}`);
      }

      const t = payload.t || [];
      const o = payload.o || [];
      const h = payload.h || [];
      const l = payload.l || [];
      const c = payload.c || [];
      const n = Math.min(t.length, o.length, h.length, l.length, c.length);

      const bars = [];
      for (let i = 0; i < n; i++) {
        bars.push({
          time: Number(t[i]),
          open: Number(o[i]),
          high: Number(h[i]),
          low: Number(l[i]),
          close: Number(c[i]),
        });
      }
      return bars;
    }

    async function loadBars(opts) {
      const url = buildHistoryUrl(opts);
      setStatus(`请求中...\n${url}`);
      const resp = await fetch(url);
      const text = await resp.text();

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}: ${text}`);
      }

      let payload;
      try {
        payload = JSON.parse(text);
      } catch (e) {
        throw new Error(`返回不是 JSON：${text.slice(0, 300)}`);
      }
      return normalizeBars(payload);
    }

    function ensureChart() {
      if (!chart) {
        chart = LightweightCharts.createChart(chartEl, {
          layout: {
            background: { color: "#020617" },
            textColor: "#cbd5e1",
          },
          grid: {
            vertLines: { color: "#1f2937" },
            horzLines: { color: "#1f2937" },
          },
          rightPriceScale: {
            borderColor: "#334155",
          },
          timeScale: {
            borderColor: "#334155",
            timeVisible: true,
            secondsVisible: false,
          },
          localization: {
            dateFormat: "yyyy-MM-dd",
          },
        });

        candle = chart.addCandlestickSeries({
          upColor: "#22c55e",
          downColor: "#ef4444",
          borderVisible: false,
          wickUpColor: "#22c55e",
          wickDownColor: "#ef4444",
        });

        resizeObserver = new ResizeObserver(() => {
          chart.applyOptions({
            width: chartEl.clientWidth,
            height: chartEl.clientHeight,
          });
        });
        resizeObserver.observe(chartEl);
      }
    }

    async function render() {
      const opts = getParams();
      setInputs(opts);

      try {
        ensureChart();
        const bars = await loadBars(opts);
        candle.setData(bars);
        if (bars.length > 0) {
          chart.timeScale().fitContent();
          setStatus(
            `已加载 ${bars.length} 根K线\n` +
            `symbol=${opts.symbol} resolution=${opts.resolution}\n` +
            `时间范围(秒): ${bars[0].time} ~ ${bars[bars.length - 1].time}`
          );
        } else {
          setStatus(`无数据\nsymbol=${opts.symbol} resolution=${opts.resolution}`);
        }
      } catch (err) {
        setStatus(`加载失败: ${err?.message || err}`);
      }
    }

    toolbar.addEventListener("submit", (e) => {
      e.preventDefault();
      const symbol = document.getElementById("symbol").value.trim() || "DCE.l";
      const resolution = document.getElementById("resolution").value;
      const days = Number(document.getElementById("days").value || "180");
      const sp = new URLSearchParams({
        symbol,
        resolution,
        days: String(days),
      });
      history.replaceState(null, "", `${location.pathname}?${sp.toString()}`);
      render();
    });

    render();
  </script>
</body>
</html>
